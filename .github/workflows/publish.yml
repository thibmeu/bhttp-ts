name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Publishes via npm trusted publishing (OIDC). No NPM_TOKEN needed:
      # the id-token permission above lets npm mint a short-lived token and
      # attach provenance automatically. A trusted publisher for this repo +
      # workflow must be configured once on npmjs.com.
      - run: npm publish --access public
