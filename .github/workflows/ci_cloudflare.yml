name: Cloudflare Workers CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # Build the package so the sample can resolve `bhttp-ts` (file:../..).
      - run: npm ci
      - run: npm run build
      # Run the sample's tests on the Workers runtime (vitest-pool-workers).
      - name: Run tests on Workers runtime
        working-directory: samples/cloudflare
        run: |
          npm install
          npx vitest run
