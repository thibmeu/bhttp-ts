name: Bun CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@v2
      # Build the package so the sample can resolve `bhttp-ts` (file:../..).
      - run: npm ci
      - run: npm run build
      # Run the samples on the Bun runtime as a smoke test.
      - name: Run samples on Bun
        working-directory: samples/node
        run: |
          bun install
          bun app.js
          bun streaming.js
