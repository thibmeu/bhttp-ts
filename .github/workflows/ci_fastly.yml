name: Fastly Compute CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # Build the package so the sample can resolve `bhttp-ts` (file:../..).
      - run: npm ci
      - run: npm run build
      # Installs the Fastly CLI. `fastly compute serve` runs locally under
      # Viceroy, so no FASTLY_API_TOKEN is required.
      - uses: fastly/compute-actions/setup@v6
      - name: Run sample on Fastly Compute (Viceroy)
        working-directory: samples/fastly
        run: |
          npm install
          fastly compute build
          nohup fastly compute serve --addr 127.0.0.1:7676 &
          sleep 15
          node test.mjs
